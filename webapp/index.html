<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>cane.ai — on-device</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; color: #eee;
               font-family: system-ui, sans-serif; overscroll-behavior: none; }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; }
  #view { max-width: 100vw; max-height: 100vh; display: block; }
  #hud { position: fixed; left: 8px; bottom: 8px; font-size: 12px;
         background: rgba(0,0,0,.5); padding: 4px 8px; border-radius: 6px; }
  #panel { position: fixed; inset: 0; display: grid; place-items: center;
           background: rgba(0,0,0,.85); text-align: center; padding: 24px; }
  #panel.hidden { display: none; }
  #panel .card { max-width: 360px; }
  button { font-size: 18px; padding: 14px 22px; border: 0; border-radius: 10px;
           background: #3ec860; color: #022; font-weight: 700; }
  #status { margin-top: 14px; font-size: 13px; color: #bbb; min-height: 1.2em; }
  .vid-hidden { position: absolute; width: 1px; height: 1px; opacity: 0;
                pointer-events: none; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="view"></canvas>
  </div>
  <div id="hud">—</div>

  <video id="cam" class="vid-hidden" playsinline muted autoplay></video>

  <div id="errlog" style="position:fixed;left:0;right:0;top:0;max-height:40vh;
       overflow:auto;background:rgba(120,0,0,.85);color:#fff;font:12px/1.4 monospace;
       padding:8px;white-space:pre-wrap;display:none;z-index:10;"></div>

  <script>
    // Surfaces errors that happen even before/while the module loads, so the
    // page never just "does nothing" silently.
    (function () {
      const box = document.getElementById("errlog");
      function show(msg) {
        box.style.display = "block";
        box.textContent += msg + "\n";
      }
      window.addEventListener("error", (e) =>
        show("ERROR: " + (e.message || e.error) +
             (e.filename ? "\n  at " + e.filename + ":" + e.lineno : "")));
      window.addEventListener("unhandledrejection", (e) =>
        show("PROMISE REJECTED: " + (e.reason && (e.reason.stack || e.reason.message || e.reason))));
    })();
  </script>

  <div id="panel">
    <div class="card">
      <h2>cane.ai</h2>
      <p>Runs sidewalk segmentation + depth on your phone, live from the camera.
         First start downloads the models (~200&nbsp;MB) once.</p>
      <button id="start">Start camera</button>
      <div id="status"></div>
    </div>
  </div>

<script type="module">
// ===========================================================================
// cane.ai — fully on-device perception in the browser.
//
// Everything runs on the phone: the camera feeds two AI models, their outputs
// are fused into navigation info, and that gets drawn over the live video.
// Your PC only serves this one file — it does none of the thinking.
//
// THE PIPELINE, STEP BY STEP (search for "STEP" to jump between them):
//   Step 1  loadModels()     – download + start the 2 models (once).
//   Step 2  perceive(frame)  – run both models on one camera frame.
//   Step 3  fuse(...)        – turn raw output into: walkable path, centerline,
//                              and obstacles ON the path.
//                              (helpers: estimateGroundProfile, obstacleBoxes)
//   Step 4  drawOverlay(...) – paint regions / arrow / boxes on screen.
//                              (helper: buildRegions)
//   Step 5  the two loops    – renderLoop draws video every frame; perceptionLoop
//                              runs Steps 2-3 in the background.
//
// Mirrors server/perception.py (segmentation + depth + fusion) and live_view.py
// (overlay). See README for hosting (the camera needs HTTPS).
// ===========================================================================
import {
  pipeline, RawImage, env
} from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0/dist/transformers.min.js";

// Cache model weights in the browser; allow remote download from the Hub.
env.allowLocalModels = false;

// ── Config: models, working resolution, fusion constants, overlay colors ───
// ---- models (swap here if you want a heavier/lighter checkpoint) ----------
// b1 is the speed/accuracy middle ground for phones: clearly better than b0 at
// finding the path/road, much faster than b2. (b0 = fastest, b2 = most accurate.)
const SEG_MODEL   = "Xenova/segformer-b1-finetuned-ade-512-512";
const DEPTH_MODEL = "onnx-community/depth-anything-v2-small";

// Working resolution for fusion. Small = fast; the camera is downscaled to
// this before inference and the overlay is scaled back up for display.
const WORK_W = 256;

// Fusion constants — kept identical to perception.py.
const GROUND_MARGIN_REL = 0.12;
const MIN_GROUND_PX = 8;

// Overlay colors. live_view.py uses BGR; here we use plain RGB.
const GREEN  = [60, 200, 60];    // sidewalk fill
const CYAN   = [50, 190, 220];   // road / terrain fill
const ORANGE = [255, 140, 0];    // direction arrow
const RED     = [230, 60, 60];   // obstacle

const $ = (id) => document.getElementById(id);
const statusEl = $("status");
const hud = $("hud");
const setStatus = (t) => { statusEl.textContent = t; };

// Category lookup for ADE labels (matches the name-matching in perception.py).
function categorize(label) {
  const n = label.toLowerCase();
  if (n.includes("sidewalk") || n.includes("pavement")) return "walkable";
  if (n.includes("road")) return "road";
  for (const w of ["grass","earth","ground","terrain","field","sand","dirt","soil"])
    if (n.includes(w)) return "terrain";
  return null;
}

// ── Module state (filled in as the app runs) ───────────────────────────────
let segPipe = null, depthPipe = null;  // the two loaded models (Step 1)
let activeDevice = "wasm";             // "webgpu" or "wasm" — whichever loaded
let running = false;                   // true while the loops run (Step 5)
let latestResult = null;               // most recent perception result (Steps 2-3)

// ── STEP 1 · Load the two AI models (once) ─────────────────────────────────
// Downloads the segmentation + depth models from the web (then browser-cached)
// and starts them on the phone's GPU (WebGPU), falling back to the CPU (WASM).
async function loadModels() {
  const tryDevice = async (device) => {
    // fp16 on the GPU (fast); 8-bit on WASM (much less memory, so phones with a
    // tight per-tab memory cap — e.g. iOS Safari — don't get killed mid-load).
    const dtype = device === "webgpu" ? "fp16" : "q8";
    setStatus(`Loading models on ${device.toUpperCase()} (${dtype})… (first time downloads weights)`);
    segPipe   = await pipeline("image-segmentation", SEG_MODEL,   { device, dtype });
    depthPipe = await pipeline("depth-estimation",   DEPTH_MODEL, { device, dtype });
    activeDevice = device;
  };

  // Some browsers (e.g. Safari) expose navigator.gpu but the WebGPU backend
  // still fails to initialize. Try it, then fall back to WASM on any error.
  if (navigator.gpu) {
    try {
      await tryDevice("webgpu");
      setStatus("Models ready (WebGPU).");
      return;
    } catch (e) {
      console.warn("WebGPU failed, falling back to WASM:", e);
      segPipe = null; depthPipe = null;
    }
  }
  await tryDevice("wasm");
  setStatus("Models ready (WASM — slower).");
}

// ── STEP 2 · Run both models on one camera frame ───────────────────────────
// Sends the frame to segmentation + depth (in parallel), turns their outputs
// into plain arrays, then calls fuse() (Step 3) for the navigation result.
async function perceive(srcCanvas) {
  const img = await RawImage.fromCanvas(srcCanvas);   // WORK-size RGB

  const [segOut, depthOut] = await Promise.all([
    segPipe(img),
    depthPipe(img),
  ]);

  const W = srcCanvas.width, H = srcCanvas.height;

  // Build per-pixel category codes from the per-class masks.
  const seg = new Int8Array(W*H);
  for (const { label, mask } of segOut) {
    const cat = categorize(label);
    if (!cat) continue;
    const code = cat === "walkable" ? 1 : cat === "road" ? 2 : 3;
    const md = mask.data;                 // single channel, mask size == img size
    // mask may differ in size if model padded; assume == W*H (it is, for SegFormer)
    for (let i = 0; i < md.length; i++) if (md[i]) seg[i] = code;
  }

  // Depth: RawImage single channel, normalized; larger value = nearer.
  const dimg = depthOut.depth;            // RawImage at input size
  const dd = dimg.data;
  const ch = dimg.channels || 1;
  const depth01 = new Float32Array(W*H);
  for (let i = 0; i < W*H; i++) depth01[i] = dd[i*ch] / 255;

  return fuse(seg, depth01, W, H);
}

// ── STEP 3 helpers · fusion math (port of perception.py) ───────────────────
// All operate on flat arrays of length W*H (row-major). depth01: 0=far .. 1=near.
//
// estimateGroundProfile: for each image row, the typical depth of the GROUND
// (median of the ground pixels), so anything sticking up closer can be flagged.
function estimateGroundProfile(depth01, ground, W, H) {
  const profile = new Float32Array(H).fill(NaN);
  const buf = new Float32Array(W);
  for (let r = 0; r < H; r++) {
    let m = 0;
    for (let c = 0; c < W; c++) if (ground[r*W + c]) buf[m++] = depth01[r*W + c];
    if (m >= MIN_GROUND_PX) {
      const s = buf.slice(0, m).sort();
      profile[r] = (m & 1) ? s[(m-1)>>1] : 0.5*(s[m/2 - 1] + s[m/2]);
    }
  }
  // Linear-interpolate rows with no ground pixels.
  const known = [];
  for (let r = 0; r < H; r++) if (!Number.isNaN(profile[r])) known.push(r);
  if (known.length < 2) return null;
  for (let r = 0; r < H; r++) {
    if (Number.isNaN(profile[r])) {
      // find bracketing known rows
      let lo = known[0], hi = known[known.length-1];
      for (let k = 0; k < known.length; k++) {
        if (known[k] <= r) lo = known[k];
        if (known[k] >= r) { hi = known[k]; break; }
      }
      profile[r] = (hi === lo) ? profile[lo]
        : profile[lo] + (profile[hi]-profile[lo]) * (r-lo)/(hi-lo);
    }
  }
  // Light vertical smoothing (box filter), k = max(3, H/60).
  const k = Math.max(3, Math.floor(H/60));
  const out = new Float32Array(H);
  const half = (k/2) | 0;
  for (let r = 0; r < H; r++) {
    let acc = 0, cnt = 0;
    for (let d = -half; d <= half; d++) {
      const rr = r + d;
      if (rr >= 0 && rr < H) { acc += profile[rr]; cnt++; }
    }
    out[r] = acc / cnt;
  }
  return out;
}

// obstacleBoxes: group obstacle pixels into connected blobs (flood fill) and
// return one bounding box per blob — so a chair becomes a single box, and tiny
// noise specks (smaller than minArea) are dropped.
function obstacleBoxes(mask, W, H, minArea) {
  const seen = new Uint8Array(W * H);
  const boxes = [];
  const stack = [];
  for (let s = 0; s < W * H; s++) {
    if (!mask[s] || seen[s]) continue;
    let minx = W, miny = H, maxx = 0, maxy = 0, area = 0;
    stack.push(s); seen[s] = 1;
    while (stack.length) {
      const j = stack.pop(), x = j % W, y = (j / W) | 0;
      area++;
      if (x < minx) minx = x; if (x > maxx) maxx = x;
      if (y < miny) miny = y; if (y > maxy) maxy = y;
      if (x > 0     && mask[j-1] && !seen[j-1]) { seen[j-1] = 1; stack.push(j-1); }
      if (x < W-1   && mask[j+1] && !seen[j+1]) { seen[j+1] = 1; stack.push(j+1); }
      if (y > 0     && mask[j-W] && !seen[j-W]) { seen[j-W] = 1; stack.push(j-W); }
      if (y < H-1   && mask[j+W] && !seen[j+W]) { seen[j+W] = 1; stack.push(j+W); }
    }
    if (area >= minArea) boxes.push({ minx, miny, maxx, maxy });
  }
  return boxes;
}

// ── STEP 3 · Fuse model outputs into navigation info ───────────────────────
// In:  per-pixel category (seg) + relative depth.
// Out: walkable mask, the path centerline, obstacle boxes ON the path, and the
//      nearest obstacle. (Obstacles off the path are intentionally ignored.)
function fuse(seg, depth01, W, H) {
  // seg: Int8Array of category codes: 0=other,1=walkable,2=road,3=terrain
  const walkable = new Uint8Array(W*H);
  const ground   = new Uint8Array(W*H);
  for (let i = 0; i < W*H; i++) {
    const s = seg[i];
    if (s === 1) walkable[i] = 1;
    if (s === 1 || s === 2 || s === 3) ground[i] = 1;
  }

  // Geometric obstacles: pixels nearer than the ground plane at their row.
  const obstacle = new Uint8Array(W*H);
  const profile = estimateGroundProfile(depth01, ground, W, H);
  if (profile) {
    for (let r = 0; r < H; r++) {
      const thr = profile[r] + GROUND_MARGIN_REL;
      for (let c = 0; c < W; c++) {
        const i = r*W + c;
        if (!ground[i] && depth01[i] > thr) obstacle[i] = 1;
      }
    }
  }

  // Restrict obstacles to the walkable corridor (per row, the band spanned by
  // walkable pixels); track the nearest one and a corridor-only obstacle mask.
  const corridorObs = new Uint8Array(W*H);
  let nearest = null, bestDepth = -1;
  for (let r = 0; r < H; r++) {
    let minc = -1, maxc = -1;
    for (let c = 0; c < W; c++) {
      if (walkable[r*W + c]) { if (minc < 0) minc = c; maxc = c; }
    }
    if (minc < 0) continue;
    for (let c = minc; c <= maxc; c++) {
      const i = r*W + c;
      if (obstacle[i]) {
        corridorObs[i] = 1;
        if (depth01[i] > bestDepth) {
          bestDepth = depth01[i];
          nearest = { distance_rel: +depth01[i].toFixed(3), column_frac: +(c/W).toFixed(3) };
        }
      }
    }
  }

  // Box the obstacle blobs (drop tiny specks of noise).
  const boxes = obstacleBoxes(corridorObs, W, H, Math.round(W*H*0.0012));

  // Centerline sampled bottom -> top.
  const centerline = [];
  const step = Math.max(1, Math.floor(H/40));
  for (let r = H-1; r >= 0; r -= step) {
    let sum = 0, cnt = 0;
    for (let c = 0; c < W; c++) if (walkable[r*W + c]) { sum += c; cnt++; }
    if (cnt) centerline.push([r, Math.round(sum/cnt)]);
  }

  return { seg, W, H, centerline, nearest, boxes };
}

// ── STEP 4 helper · region overlay bitmap ──────────────────────────────────
// buildRegions: paint walkable=green / road=cyan into a small image, done once
// per perception result (cached on it) so the render loop just scales it up.
function buildRegions(seg, W, H) {
  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const id = ctx.createImageData(W, H);
  const p = id.data;
  let hasW = false, hasC = false;
  for (let i = 0; i < W * H; i++) {
    const s = seg[i];
    let col = null;
    if (s === 2 || s === 3) { col = CYAN; hasC = true; }
    if (s === 1) { col = GREEN; hasW = true; }     // sidewalk wins overlaps
    if (col) {
      p[i*4] = col[0]; p[i*4+1] = col[1]; p[i*4+2] = col[2]; p[i*4+3] = 115;
    }
  }
  ctx.putImageData(id, 0, 0);
  return { bmp: cv, hasW, hasC };
}

// ── STEP 4 · Draw everything on screen ─────────────────────────────────────
// Paints the colored regions, the short direction arrow, the red obstacle
// boxes, and the legend onto the visible canvas.
function drawOverlay(displayCtx, dw, dh, r) {
  const { seg, W, H, centerline, nearest, boxes } = r;
  const sx = dw / W, sy = dh / H;

  // Region fill + edge outlines — built once per result, then just scaled up.
  if (!r._vis) r._vis = buildRegions(seg, W, H);
  displayCtx.imageSmoothingEnabled = true;
  displayCtx.drawImage(r._vis.bmp, 0, 0, W, H, 0, 0, dw, dh);

  // Direction arrow — only the lower part of the path, so it stays short.
  const apts = centerline.slice(0, Math.max(2, Math.round(centerline.length * 0.4)));
  if (apts.length >= 2) {
    displayCtx.strokeStyle = `rgb(${ORANGE.join(",")})`;
    displayCtx.lineWidth = Math.max(6, dw*0.03);
    displayCtx.lineJoin = "round"; displayCtx.lineCap = "round";
    displayCtx.beginPath();
    apts.forEach(([row, c], k) => {
      const x = c*sx, y = row*sy;
      k ? displayCtx.lineTo(x, y) : displayCtx.moveTo(x, y);
    });
    displayCtx.stroke();
    // arrowhead at the last (top) point
    const [r0, c0] = apts[apts.length-1];
    const [r1, c1] = apts[apts.length-2];
    const dx = (c0-c1)*sx, dy = (r0-r1)*sy;
    const n = Math.hypot(dx, dy) || 1;
    const ux = dx/n, uy = dy/n, px = -uy, py = ux;
    const tipX = c0*sx, tipY = r0*sy;
    const hl = dw*0.05, hw = dw*0.035;
    displayCtx.fillStyle = `rgb(${ORANGE.join(",")})`;
    displayCtx.beginPath();
    displayCtx.moveTo(tipX + ux*hl, tipY + uy*hl);
    displayCtx.lineTo(tipX + px*hw, tipY + py*hw);
    displayCtx.lineTo(tipX - px*hw, tipY - py*hw);
    displayCtx.closePath();
    displayCtx.fill();
  }

  // Obstacle boxes: a thin red rectangle around each obstacle blob on the path.
  if (boxes && boxes.length) {
    displayCtx.strokeStyle = `rgb(${RED.join(",")})`;
    displayCtx.lineWidth = 3;
    displayCtx.font = "bold 14px system-ui";
    displayCtx.fillStyle = `rgb(${RED.join(",")})`;
    for (const b of boxes) {
      const x = b.minx*sx, y = b.miny*sy;
      const w = (b.maxx-b.minx)*sx, h = (b.maxy-b.miny)*sy;
      displayCtx.strokeRect(x, y, w, h);
    }
    if (nearest) displayCtx.fillText(`nearest ${nearest.distance_rel.toFixed(2)}`, 10, dh-12);
  }

  // Legend chips (presence flags computed once in buildRegions).
  const present = [];
  if (r._vis.hasW) present.push(["Sidewalk", GREEN]);
  if (r._vis.hasC) present.push(["Road / Terrain", CYAN]);
  let lx = 10;
  displayCtx.font = "bold 14px system-ui";
  for (const [text, col] of present) {
    const tw = displayCtx.measureText(text).width;
    displayCtx.fillStyle = "rgba(30,30,30,.6)";
    displayCtx.fillRect(lx, 10, 26 + tw + 16, 30);
    displayCtx.fillStyle = `rgb(${col.join(",")})`;
    displayCtx.fillRect(lx+8, 16, 18, 18);
    displayCtx.fillStyle = "#fff";
    displayCtx.fillText(text, lx+32, 30);
    lx += 26 + tw + 26;
  }
}

// ── STEP 5 · Runtime: camera + the two loops ───────────────────────────────
// "work" canvas = small, fed to the models; "view" canvas = big, shown to user.
const cam = $("cam");
const view = $("view");
const vctx = view.getContext("2d");
const work = document.createElement("canvas");
const wctx = work.getContext("2d", { willReadFrequently: true });

// startCamera: ask the phone for its rear camera and start the video stream.
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } },
    audio: false,
  });
  cam.srcObject = stream;
  await cam.play();
}

// sizeCanvases: set the small "work" canvas (for the AI) and the big "view"
// canvas (shown on screen), both matching the camera's aspect ratio.
function sizeCanvases() {
  const vw = cam.videoWidth, vh = cam.videoHeight;
  const aspect = vh / vw;
  work.width = WORK_W;
  work.height = Math.round(WORK_W * aspect);
  // Display canvas fills as much of the screen as possible at video aspect.
  const maxW = window.innerWidth, maxH = window.innerHeight;
  let dw = maxW, dh = dw * aspect;
  if (dh > maxH) { dh = maxH; dw = dh / aspect; }
  view.width = Math.round(dw);
  view.height = Math.round(dh);
}

// Render loop: runs every animation frame so the VIDEO stays smooth, drawing
// the live camera plus whatever the most recent perception result was. This is
// decoupled from inference, so a slow model no longer freezes the picture.
function renderLoop() {
  if (!running) return;
  if (cam.readyState >= 2) {
    if (view.width === 0) sizeCanvases();
    vctx.drawImage(cam, 0, 0, view.width, view.height);
    if (latestResult) drawOverlay(vctx, view.width, view.height, latestResult);
  }
  requestAnimationFrame(renderLoop);
}

// Perception loop: runs the models back-to-back as fast as the device allows,
// updating `latestResult`. Independent of the render loop's frame rate.
async function perceptionLoop() {
  while (running) {
    if (cam.readyState >= 2) {
      if (work.width === 0) sizeCanvases();
      wctx.drawImage(cam, 0, 0, work.width, work.height);
      const t0 = performance.now();
      try {
        latestResult = await perceive(work);
        const ms = performance.now() - t0;
        hud.textContent = `${(1000/ms).toFixed(1)} infer/s · ${ms|0} ms · ${activeDevice}`;
      } catch (e) {
        hud.textContent = "error: " + e.message;
        console.error(e);
      }
    } else {
      await new Promise(res => setTimeout(res, 50));
    }
  }
}

// The Start button ties it all together: camera → load models → run both loops.
$("start").addEventListener("click", async () => {
  $("start").disabled = true;
  try {
    setStatus("Requesting camera…");
    await startCamera();
    await loadModels();
    sizeCanvases();
    $("panel").classList.add("hidden");
    running = true;
    renderLoop();        // smooth video
    perceptionLoop();    // models in the background
  } catch (e) {
    setStatus("Failed: " + e.message);
    $("start").disabled = false;
    console.error(e);
  }
});

window.addEventListener("resize", () => { if (running) sizeCanvases(); });
</script>
</body>
</html>
